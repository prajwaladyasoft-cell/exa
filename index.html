<!DOCTYPE html>
<html>
<head>
    <title>Editable Heading</title>
</head>
<body>

<h1 id="myHeading">Hello World</h1>

<br>

<label>Text:</label>
<input type="text" id="textInput"><br><br>

<label>Color:</label>
<input type="color" id="colorInput"><br><br>

<label>Font Size:</label>
<input type="number" id="sizeInput"> px<br><br>

<button onclick="applyChanges()">Apply</button>
<button onclick="saveToGitHub()">Save</button>

<script>

const heading = document.getElementById("myHeading");

// Apply changes visually
function applyChanges(){
    heading.innerText = document.getElementById("textInput").value;
    heading.style.color = document.getElementById("colorInput").value;
    heading.style.fontSize = document.getElementById("sizeInput").value + "px";
}

// Save to GitHub
<script>
async function saveToGitHub(){

    const token = "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";
    const username = "prajwaladyasoft-cell";
    const repo = "exa";
    const path = "index.html";

    // 1️⃣ Get current file
    const getFile = await fetch(`https://api.github.com/repos/${username}/${repo}/contents/${path}`);
    const fileData = await getFile.json();

    // 2️⃣ Decode original HTML
    const originalHTML = atob(fileData.content);

    // 3️⃣ Replace only body content
    const parser = new DOMParser();
    const doc = parser.parseFromString(originalHTML, "text/html");

    doc.body.innerHTML = document.body.innerHTML;

    const updatedHTML = doc.documentElement.outerHTML;

    // 4️⃣ Save updated file
    await fetch(`https://api.github.com/repos/${username}/${repo}/contents/${path}`, {
        method: "PUT",
        headers: {
            "Authorization": "Bearer " + token,
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            message: "Updated content",
            content: btoa(updatedHTML),
            sha: fileData.sha
        })
    });

    alert("Saved correctly. Netlify will redeploy.");
}
</script>
</script>

</body>
</html>
